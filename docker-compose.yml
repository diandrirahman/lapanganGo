
services:
  postgres:
    image: postgres:16
    container_name: lapangango_postgres
    restart: always
    environment:
      POSTGRES_USER: lapangango_user
      POSTGRES_PASSWORD: lapangango_password
      POSTGRES_DB: lapangango_db
    ports:
      - "5432:5432"
    volumes:
      - lapangango_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lapangango_user -d lapangango_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: lapangango_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: lapangango_api
    restart: always
    environment:
      - DATABASE_URL=postgres://lapangango_user:lapangango_password@postgres:5432/lapangango_db?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=supersecretkey
      - BOOKING_PAYMENT_TTL_MINUTES=10
      - BOOKING_EXPIRY_SWEEP_INTERVAL_SECONDS=10
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: lapangango_web
    restart: always
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  lapangango_postgres_data:
