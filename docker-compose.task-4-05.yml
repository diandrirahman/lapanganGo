services:
  postgres:
    container_name: ${TASK405_CONTAINER_PREFIX:-lapangango_task405}_postgres
    ports: !override
      - "15432:5432"
    volumes: !override
      - lapangango_task405_postgres_data:/var/lib/postgresql/data

  redis:
    container_name: ${TASK405_CONTAINER_PREFIX:-lapangango_task405}_redis
    ports: !override
      - "16379:6379"

  api:
    container_name: ${TASK405_CONTAINER_PREFIX:-lapangango_task405}_api
    ports: !override
      - "18080:8080"

  web:
    container_name: ${TASK405_CONTAINER_PREFIX:-lapangango_task405}_web
    ports: !override
      - "13000:80"

  mailpit:
    container_name: ${TASK405_CONTAINER_PREFIX:-lapangango_task405}_mailpit
    ports: !override
      - "11025:1025"
      - "18025:8025"

volumes:
  lapangango_task405_postgres_data:
